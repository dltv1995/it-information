<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ระบบจองห้องประชุม</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Prompt','Sarabun','sans-serif']},colors:{brand:{500:'#0ea5e9',600:'#0284c7',900:'#0f172a'}}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/header.css"><link rel="stylesheet" href="assets/css/meeting.css?v=meeting-free-time-ui-v3">
<script>if(localStorage.getItem('color-theme')==='dark'||(!('color-theme'in localStorage)&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')</script>
</head>
<body id="appBody" data-title="ระบบจองห้องประชุม" data-subtitle="จองห้อง เลือกเวลาเอง แนบเอกสาร และตรวจสอบรายการ" data-active-menu="meeting" class="bg-slate-50 dark:bg-slate-900 font-sans text-slate-700 dark:text-slate-300 hidden m-0">
<div id="layoutRoot" class="flex h-screen overflow-hidden"></div>
<template id="meetingTemplate"><section class="meeting-page">
<div id="meetingStatus" class="meeting-alert hidden"></div>
<div class="meeting-tabs"><button class="meeting-tab active" data-tab="booking"><i class="fa-solid fa-circle-plus"></i> จองห้อง</button><button class="meeting-tab" data-tab="list"><i class="fa-solid fa-list"></i> รายการ <span id="bookingCountBadge" class="tab-badge hidden">0</span></button><button class="meeting-tab" data-tab="stats"><i class="fa-solid fa-chart-column"></i> สถิติ</button></div>
<section id="tab-booking" class="meeting-panel active">
<div class="meeting-card"><div class="card-title"><i class="fa-solid fa-door-open"></i> เลือกห้องประชุม</div><p class="muted">ห้องประชุม 1 รองรับสูงสุด 40 คน ส่วนห้องประชุม 2 รองรับสูงสุด 10 คน</p><div id="roomGrid" class="room-grid"></div></div>
<div id="bookingSteps" class="booking-steps disabled">
<div class="meeting-card"><div class="card-title"><i class="fa-solid fa-calendar-clock"></i> วันที่และเวลา</div><div class="form-grid"><div class="form-group"><label>วันที่ <em>*</em></label><input id="bookingDate" type="date" class="form-control"></div><div class="form-group"><label>จำนวนผู้เข้าร่วม <em>*</em></label><input id="attendees" type="number" min="1" class="form-control" placeholder="เลือกห้องก่อน"><small id="capacityHint" class="capacity-hint"></small></div></div><div class="form-group mt-4"><label>กำหนดเวลาประชุม <em>*</em> <small>เลือกเวลาเริ่มต้นและสิ้นสุดได้เอง</small></label><div class="custom-time-grid"><div class="time-input-card"><span class="time-icon start"><i class="fa-solid fa-play"></i></span><div><small>เวลาเริ่มต้น</small><input id="startTime" type="time" step="300" class="form-control time-control"></div></div><i class="fa-solid fa-arrow-right time-arrow"></i><div class="time-input-card"><span class="time-icon end"><i class="fa-solid fa-flag-checkered"></i></span><div><small>เวลาสิ้นสุด</small><input id="endTime" type="time" step="300" class="form-control time-control"></div></div></div><div id="selectedTimeText" class="selected-time hidden"></div></div></div>
<div class="meeting-card"><div class="card-title"><i class="fa-solid fa-user"></i> ข้อมูลผู้จอง</div><div class="form-grid"><div class="form-group"><label>ชื่อ-นามสกุล <em>*</em></label><input id="bookerName" class="form-control"></div><div class="form-group"><label>ส่วนงาน <em>*</em></label><select id="bookerDept" class="form-control"><option value="">-- เลือกส่วนงาน --</option><option>งานเทคนิค</option><option>งานสารสนเทศ</option><option>งานสื่อสารองค์กร</option><option>หน่วยงานอื่น</option></select></div><div class="form-group"><label>เบอร์โทร <em>*</em></label><input id="bookerPhone" class="form-control"></div><div class="form-group"><label>อีเมล</label><input id="bookerEmail" type="email" class="form-control"></div></div></div>
<div class="meeting-card"><div class="card-title"><i class="fa-solid fa-clipboard-list"></i> หัวข้อประชุม</div><div class="form-group"><label>หัวข้อประชุม <em>*</em></label><input id="topic" class="form-control"></div><div class="form-group mt-4"><label>รายละเอียด</label><textarea id="detail" rows="3" class="form-control"></textarea></div></div>
<div class="meeting-card equipment-section"><div class="section-heading"><span class="heading-icon"><i class="fa-solid fa-screwdriver-wrench"></i></span><div><h3>เลือกอุปกรณ์ที่ใช้งาน</h3><p>เลือกได้มากกว่าหนึ่งรายการตามรูปแบบการประชุม</p></div><span id="equipmentCount" class="selection-count">เลือก 0 รายการ</span></div><div id="equipmentList" class="equipment-grid"></div></div>
<div class="meeting-card"><div class="card-title"><i class="fa-solid fa-paperclip"></i> เอกสารการประชุม</div><div id="fileDropZone" class="file-drop"><input id="meetingFiles" type="file" multiple class="hidden" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png"><button id="chooseFilesBtn" class="btn-secondary" type="button"><i class="fa-solid fa-cloud-arrow-up"></i> เลือกไฟล์แนบ</button><p>รองรับ PDF, Word, Excel, PowerPoint และรูปภาพ</p></div><div id="fileList" class="file-list"></div></div>
<div id="summaryBox" class="meeting-summary hidden"><div class="card-title"><i class="fa-solid fa-file-circle-check"></i> สรุปรายการจอง</div><div id="summaryContent"></div><button id="submitBookingBtn" class="btn-primary"><i class="fa-solid fa-paper-plane"></i> ยืนยันการจอง</button></div>
</div></section>
<section id="tab-list" class="meeting-panel"><div class="stats-grid"><div class="stat-card"><strong id="statTotal">0</strong><span>จองทั้งหมด</span></div><div class="stat-card"><strong id="statRoom1">0</strong><span>ห้อง 1</span></div><div class="stat-card"><strong id="statRoom2">0</strong><span>ห้อง 2</span></div><div class="stat-card"><strong id="statToday">0</strong><span>วันนี้</span></div></div><div class="meeting-card"><div class="toolbar"><select id="filterRoom" class="form-control"><option value="">ทุกห้อง</option><option value="1">ห้อง 1</option><option value="2">ห้อง 2</option></select><input id="filterDate" type="date" class="form-control"><input id="filterSearch" class="form-control" placeholder="ค้นหา"><button id="exportCsvBtn" class="btn-secondary">ส่งออก CSV</button></div><div id="bookingList" class="booking-list"></div></div></section>
<section id="tab-stats" class="meeting-panel"><div class="meeting-card"><div class="section-heading"><span class="heading-icon"><i class="fa-solid fa-chart-column"></i></span><div><h3>สถิติการใช้งานห้องประชุม</h3><p>จำนวนชั่วโมงการใช้งานรายเดือน</p></div><select id="statsYear" class="form-control year-select"></select></div><div class="stats-grid"><div class="stat-card"><strong id="totalHours">0</strong><span>ชั่วโมงรวม</span></div><div class="stat-card"><strong id="room1Hours">0</strong><span>ห้อง 1</span></div><div class="stat-card"><strong id="room2Hours">0</strong><span>ห้อง 2</span></div><div class="stat-card"><strong id="averageHours">0</strong><span>เฉลี่ย/เดือน</span><small id="peakMonth"></small></div></div><div class="chart-wrap"><canvas id="statsChart"></canvas></div></div></section>
</section></template>
<script src="assets/js/header.js?v=header-meeting-hard-fix-v3"></script><script type="module" src="assets/js/meeting.js?v=meeting-free-time-ui-v3"></script><script type="module" src="assets/js/session-timeout.js?v=session-timeout-v1"></script>
</body></html>
