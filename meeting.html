<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ระบบจองห้องประชุม</title>
<script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/header.css"><link rel="stylesheet" href="assets/css/meeting.css?v=meeting-stable-draft-attachments-v4"></head>
<body id="appBody" data-title="ระบบจองห้องประชุม" data-subtitle="จองห้อง เลือกเวลาเอง และจัดการรายการ" data-active-menu="meeting" class="bg-slate-50 font-sans hidden"><div id="layoutRoot" class="flex h-screen overflow-hidden"></div>
<template id="meetingTemplate"><section class="meeting-page space-y-6"><div id="meetingStatus" class="meeting-alert hidden"></div>
<div class="meeting-tabs"><button class="meeting-tab active" data-tab="booking">จองห้อง</button><button class="meeting-tab" data-tab="list">รายการ <span id="bookingCountBadge" class="tab-badge hidden">0</span></button><button class="meeting-tab" data-tab="stats">สถิติ</button></div>
<div id="tab-booking" class="meeting-panel active"><div class="meeting-card"><div class="card-title"><i class="fa-solid fa-door-open"></i> เลือกห้องประชุม</div><p class="muted">ห้องประชุม 1 รองรับ 40 คน ส่วนห้องประชุม 2 รองรับ 10 คน</p><div id="roomGrid" class="room-grid"></div></div>
<div id="bookingSteps" class="booking-steps disabled"><div class="meeting-card"><div class="card-title">วันที่และเวลา</div><div class="form-grid"><div class="form-group"><label>วันที่ *</label><input id="bookingDate" type="date" class="form-control"></div><div class="form-group"><label>จำนวนผู้เข้าร่วม *</label><input id="attendees" type="number" min="1" class="form-control"><small id="capacityHint" class="capacity-hint hidden"></small></div></div><div class="custom-time-grid mt-4"><div class="time-input-card"><span class="time-icon start"><i class="fa-solid fa-play"></i></span><div><small>เวลาเริ่มต้น</small><input id="startTime" type="time" step="300" class="form-control time-control"></div></div><i class="fa-solid fa-arrow-right time-arrow"></i><div class="time-input-card"><span class="time-icon end"><i class="fa-solid fa-flag-checkered"></i></span><div><small>เวลาสิ้นสุด</small><input id="endTime" type="time" step="300" class="form-control time-control"></div></div></div><div id="selectedTimeText" class="selected-time hidden"></div></div>
<div class="meeting-card"><div class="card-title">ข้อมูลผู้จอง</div><div class="form-grid"><input id="bookerName" class="form-control" placeholder="ชื่อ-นามสกุล *"><select id="bookerDept" class="form-control"><option value="">-- เลือกส่วนงาน * --</option><option>ผู้บริหาร</option><option>ฝ่ายสารสนเทศฯ</option><option>ฝ่ายบริหารงานทั่วไป</option><option>หน่วยงานภายนอก</option></select><input id="bookerPhone" class="form-control" placeholder="เบอร์โทร *"><input id="bookerEmail" type="email" class="form-control" placeholder="อีเมล"></div></div>
<div class="meeting-card"><div class="card-title">หัวข้อประชุม</div><input id="topic" class="form-control" placeholder="หัวข้อประชุม *"><textarea id="detail" class="form-control mt-4" rows="3" placeholder="รายละเอียด"></textarea></div>
<div class="meeting-card"><div class="section-heading"><span class="heading-icon"><i class="fa-solid fa-screwdriver-wrench"></i></span><div><h3>เลือกอุปกรณ์ที่ใช้งาน</h3><p>เลือกได้หลายรายการ</p></div><span id="equipmentCount" class="selection-count">เลือก 0 รายการ</span></div><div id="equipmentList" class="equipment-grid"></div></div>
<div class="meeting-card"><div class="card-title">เอกสารการประชุม (แบบร่าง)</div><div id="fileDropZone" class="file-drop"><input id="meetingFiles" type="file" multiple class="hidden" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png"><button id="chooseFilesBtn" type="button" class="btn-secondary">เลือกไฟล์แบบร่าง</button><p>เลือกไฟล์ได้ แต่ยังไม่อัปโหลดไปยัง Storage</p></div><div id="fileList" class="file-list"></div></div>
<div id="summaryBox" class="meeting-summary hidden"><div id="summaryContent"></div><button id="submitBookingBtn" class="btn-primary mt-4">ยืนยันการจอง</button></div></div></div>
<div id="tab-list" class="meeting-panel"><div class="stats-grid"><div class="stat-card"><strong id="statTotal">0</strong><span>ทั้งหมด</span></div><div class="stat-card"><strong id="statRoom1">0</strong><span>ห้อง 1</span></div><div class="stat-card"><strong id="statRoom2">0</strong><span>ห้อง 2</span></div><div class="stat-card"><strong id="statToday">0</strong><span>วันนี้</span></div></div><div class="meeting-card"><div class="toolbar"><select id="filterRoom" class="form-control"><option value="">ทุกห้อง</option><option value="1">ห้อง 1</option><option value="2">ห้อง 2</option></select><input id="filterDate" type="date" class="form-control"><input id="filterSearch" class="form-control" placeholder="ค้นหา"><button id="exportCsvBtn" class="btn-secondary">ส่งออก CSV</button></div><div id="bookingList" class="booking-list"></div></div></div>
<div id="tab-stats" class="meeting-panel"><div class="meeting-card"><div class="section-heading"><div><h3>สถิติการใช้ห้องประชุม</h3></div><select id="statsYear" class="form-control year-select"></select></div><div class="stats-grid"><div class="stat-card"><strong id="totalHours">0</strong><span>ชั่วโมงรวม</span></div><div class="stat-card"><strong id="room1Hours">0</strong><span>ห้อง 1</span></div><div class="stat-card"><strong id="room2Hours">0</strong><span>ห้อง 2</span></div><div class="stat-card"><strong id="averageHours">0</strong><span>เฉลี่ย/เดือน</span><small id="peakMonth"></small></div></div><div class="chart-wrap"><canvas id="statsChart"></canvas></div></div></div>
</section></template><script src="assets/js/header.js?v=header-meeting-hard-fix-v3"></script><script type="module" src="assets/js/meeting.js?v=meeting-stable-draft-attachments-v4"></script><script type="module" src="assets/js/session-timeout.js?v=session-timeout-v1"></script></body></html>
