<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ระบบบริหารจัดการงบประมาณและโครงการ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/dashboard.css?v=dashboard-popup-remove-v12">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#0f172a' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b' },
                        emeraldx: { 400: '#34d399', 500: '#10b981' }
                    }
                }
            }
        };
    </script>
</head>
<body id="appBody"
      data-title="แดชบอร์ดงบประมาณและโครงการ"
      data-subtitle="ภาพรวมงบประมาณ งานโครงการ ภาระงาน และรายการเร่งด่วนจาก Firebase"
      class="bg-slate-50 dark:bg-slate-950 transition-theme font-sans text-slate-700 dark:text-slate-300 hidden m-0">
    <div id="layoutRoot" class="flex h-screen overflow-hidden"></div>

    <template id="dashboardTemplate">
        <section class="space-y-6">
            <div id="firebaseStatus" class="hidden rounded-2xl border px-4 py-3 text-sm"></div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-5">
                <article class="dashboard-card metric-card rounded-2xl p-6" style="--accent:#2563eb">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-blue-500/15 text-blue-500 flex items-center justify-center">
                            <i class="ph-fill ph-file-text text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-slate-500 dark:text-slate-400">งบประมาณรวมฝ่าย</p>
                            <h3 id="totalBudget" class="text-3xl font-extrabold text-slate-900 dark:text-white mt-1">฿0</h3>
                            <p class="text-xs font-semibold text-blue-500 mt-1">อ่านจาก settings/budget.totalBudget</p>
                        </div>
                    </div>
                </article>

                <article class="dashboard-card metric-card rounded-2xl p-6" style="--accent:#f59e0b">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-amber-500/15 text-amber-500 flex items-center justify-center">
                            <i class="ph-fill ph-receipt text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-slate-500 dark:text-slate-400">งบที่อนุมัติแล้ว</p>
                            <h3 id="usedBudget" class="text-3xl font-extrabold text-slate-900 dark:text-white mt-1">฿0</h3>
                            <p id="usedPercent" class="text-xs font-semibold text-amber-500 mt-1">0% ของงบประมาณรวมฝ่าย</p>
                        </div>
                    </div>
                </article>

                <article class="dashboard-card metric-card rounded-2xl p-6" style="--accent:#10b981">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-emerald-500/15 text-emerald-500 flex items-center justify-center">
                            <i class="ph-fill ph-money text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-slate-500 dark:text-slate-400">งบประมาณรวมคงเหลือ</p>
                            <h3 id="remainingBudget" class="text-3xl font-extrabold text-slate-900 dark:text-white mt-1">฿0</h3>
                            <p id="remainingPercent" class="text-xs font-semibold text-emerald-500 mt-1">0% ของงบประมาณรวมฝ่าย</p>
                        </div>
                    </div>
                </article>
            </div>

            <div class="grid grid-cols-1 2xl:grid-cols-7 gap-5">
                <section class="dashboard-card rounded-2xl 2xl:col-span-4 overflow-hidden">
                    <div class="px-6 py-5 border-b border-slate-200/70 dark:border-slate-700/70 flex items-center justify-between gap-4">
                        <div>
                            <h3 class="font-bold text-slate-900 dark:text-white">สถานะงบประมาณโครงการย่อย</h3>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">แสดงโครงการและงบที่อนุมัติจาก Firebase</p>
                        </div>
                        <button id="addProjectBtn" onclick="window.location.href='projects.html'" class="inline-flex items-center gap-2 px-3 py-2 rounded-full border border-slate-300 dark:border-slate-700 text-xs font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                            <i class="ph ph-plus"></i> เพิ่มโครงการ
                        </button>
                    </div>
                    <div id="projectList" class="p-5 space-y-4 max-h-[390px] overflow-y-auto soft-scroll"></div>
                </section>

                <section class="dashboard-card rounded-2xl 2xl:col-span-3 overflow-hidden">
                    <div class="px-6 py-5 border-b border-slate-200/70 dark:border-slate-700/70">
                        <h3 class="font-bold text-slate-900 dark:text-white">สัดส่วนงบประมาณตามส่วนงาน</h3>
                    </div>
                    <div class="p-5 chart-box">
                        <canvas id="budgetChart"></canvas>
                    </div>
                </section>
            </div>

            <div class="grid grid-cols-1 2xl:grid-cols-2 gap-5">
                <section class="dashboard-card rounded-2xl overflow-hidden">
                    <div class="px-6 py-5 border-b border-slate-200/70 dark:border-slate-700/70">
                        <h3 class="font-bold text-slate-900 dark:text-white">ภาระงานของทีมงานรายบุคคล</h3>
                    </div>
                    <div class="p-5 chart-box">
                        <canvas id="workloadChart"></canvas>
                    </div>
                </section>
                <section class="dashboard-card rounded-2xl overflow-hidden">
                    <div class="px-6 py-5 border-b border-slate-200/70 dark:border-slate-700/70">
                        <h3 class="font-bold text-slate-900 dark:text-white">งานที่ล่าช้าหรือใกล้ถึงกำหนดส่ง (Overdue / Urgent)</h3>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">งานที่ต้องการการดูแลอย่างใกล้ชิด</p>
                    </div>
                    <div id="urgentList" class="p-5 space-y-3"></div>
                </section>
            </div>
        </section>
    </template>

    <script src="assets/js/header.js?v=dashboard-popup-remove-v12"></script>
    <script type="module" src="assets/js/dashboard.js?v=dashboard-fiscal-filter-budget-v30script>"></script>
</body>
</html>
