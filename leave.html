<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจัดการวันลา - ระบบบริหารจัดการ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/header.css?v=simple-header-v4-self-mount">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
    tailwind.config = { darkMode:'class', theme:{ extend:{ fontFamily:{ sans:['Prompt','sans-serif'] }, colors:{ brand:{50:'#f0f9ff',100:'#e0f2fe',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0f172a'} } } } };
  </script>
</head>
<body id="appBody" data-template="leaveTemplate" data-title="ระบบจัดการวันลา" data-subtitle="ยื่นใบลา ตรวจสอบสถานะ และอนุมัติการลา" data-active-menu="leave" class="bg-slate-50 dark:bg-slate-950 transition-theme font-sans text-slate-700 dark:text-slate-300 hidden m-0">
  <div id="layoutRoot" class="flex h-screen overflow-hidden"></div>

  <template id="leaveTemplate">
    <section class="space-y-6">
      <div id="pageAlert" class="hidden rounded-2xl border px-4 py-3 text-sm"></div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <article class="clean-card p-6 flex justify-between items-center transition-theme border-l-4 border-sky-500">
          <div>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-1">โควตาลาพักร้อนคงเหลือ</p>
            <div class="text-3xl font-extrabold text-slate-900 dark:text-white"><span id="quotaAnnual">--</span> <span class="text-lg font-normal text-slate-500">วัน</span></div>
          </div>
          <div class="w-14 h-14 rounded-2xl bg-sky-100 dark:bg-sky-900/50 text-sky-600 dark:text-sky-400 flex items-center justify-center"><i class="ph ph-airplane-tilt text-3xl"></i></div>
        </article>
        <article class="clean-card p-6 flex justify-between items-center transition-theme border-l-4 border-rose-500">
          <div>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-1">โควตาลาป่วยคงเหลือ</p>
            <div class="text-3xl font-extrabold text-slate-900 dark:text-white"><span id="quotaSick">--</span> <span class="text-lg font-normal text-slate-500">วัน</span></div>
          </div>
          <div class="w-14 h-14 rounded-2xl bg-rose-100 dark:bg-rose-900/50 text-rose-600 dark:text-rose-400 flex items-center justify-center"><i class="ph ph-first-aid text-3xl"></i></div>
        </article>
      </div>

      <div class="flex border-b border-slate-200 dark:border-slate-700 transition-theme">
        <button id="tabMyLeaves" class="px-6 py-3 font-semibold text-brand-600 dark:text-sky-400 border-b-2 border-brand-600 dark:border-sky-400 bg-brand-50 dark:bg-slate-800/50 transition-colors">การลาของฉัน</button>
        <button id="tabApprovals" class="px-6 py-3 font-semibold text-slate-500 dark:text-slate-400 border-b-2 border-transparent hover:text-slate-800 dark:hover:text-white hidden transition-colors">รายการรออนุมัติ <span id="pendingBadge" class="ml-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full hidden">0</span></button>
      </div>

      <div id="viewMyLeaves" class="block">
        <div class="clean-card p-6 transition-theme">
          <div class="flex flex-wrap gap-4 justify-between items-center mb-6">
            <div><h3 class="text-lg font-bold text-slate-800 dark:text-white transition-theme">ประวัติการลา</h3><p class="text-xs text-slate-500 dark:text-slate-400 mt-1">รายการใบลาของผู้ใช้งานที่เข้าสู่ระบบ</p></div>
            <button id="requestLeaveBtn" class="flex items-center gap-2 text-sm text-white bg-brand-600 hover:bg-brand-700 dark:bg-sky-600 dark:hover:bg-sky-700 px-4 py-2.5 rounded-lg font-semibold transition-colors shadow-sm"><i class="ph ph-plus-circle text-lg"></i> ยื่นใบลาใหม่</button>
          </div>
          <div class="overflow-x-auto rounded-2xl border border-slate-200 dark:border-slate-700">
            <table class="w-full text-left border-collapse min-w-[760px]">
              <thead><tr class="text-sm text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700 bg-slate-50/80 dark:bg-slate-700/30 transition-theme"><th class="py-3 px-4 font-medium">ประเภท</th><th class="py-3 px-4 font-medium">วันที่ลา</th><th class="py-3 px-4 font-medium text-center">จำนวน</th><th class="py-3 px-4 font-medium">เหตุผล</th><th class="py-3 px-4 font-medium text-center">สถานะ</th></tr></thead>
              <tbody id="myLeavesTableBody" class="text-sm text-slate-600 dark:text-slate-300 transition-theme"><tr><td colspan="5" class="py-8 text-center text-slate-400">กำลังโหลด...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="viewApprovals" class="hidden">
        <div class="clean-card p-6 transition-theme">
          <div class="mb-6"><h3 class="text-lg font-bold text-slate-800 dark:text-white transition-theme">รายการลาที่รอการอนุมัติ</h3><p class="text-xs text-slate-500 dark:text-slate-400 mt-1">สำหรับผู้มีสิทธิ์อนุมัติวันลา</p></div>
          <div class="overflow-x-auto rounded-2xl border border-slate-200 dark:border-slate-700">
            <table class="w-full text-left border-collapse min-w-[820px]">
              <thead><tr class="text-sm text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700 bg-slate-50/80 dark:bg-slate-700/30 transition-theme"><th class="py-3 px-4 font-medium">ผู้ยื่นเรื่อง</th><th class="py-3 px-4 font-medium">ประเภทและวันที่ลา</th><th class="py-3 px-4 font-medium">เหตุผล</th><th class="py-3 px-4 font-medium text-right">จัดการ</th></tr></thead>
              <tbody id="approvalsTableBody" class="text-sm text-slate-600 dark:text-slate-300 transition-theme"><tr><td colspan="4" class="py-8 text-center text-slate-400">กำลังโหลด...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </template>

  <div id="leaveModal" class="fixed inset-0 bg-slate-900/60 dark:bg-black/80 backdrop-blur-sm z-[80] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-200">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-200 dark:border-slate-700 overflow-hidden transform scale-95 transition-transform duration-200" id="leaveModalContent">
      <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50"><h3 class="text-lg font-bold text-slate-800 dark:text-white">ยื่นใบลาใหม่</h3><button id="closeLeaveModalBtn" type="button" class="text-slate-400 hover:text-slate-600 dark:hover:text-white"><i class="ph ph-x text-xl"></i></button></div>
      <div class="p-6"><form id="leaveForm" class="space-y-4"><div id="leaveModalError" class="hidden bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-sm p-3 rounded-lg border border-red-100 dark:border-red-800/50 mb-4"></div><div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">ประเภทการลา</label><select id="leaveType" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-brand-500 outline-none"><option value="annual">ลาพักร้อน</option><option value="sick">ลาป่วย</option><option value="personal">ลากิจ</option></select></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">วันที่เริ่มต้น</label><input type="date" id="leaveStart" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-brand-500 outline-none"></div><div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">วันที่สิ้นสุด</label><input type="date" id="leaveEnd" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-brand-500 outline-none"></div></div><div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">เหตุผลการลา</label><textarea id="leaveReason" rows="3" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-white focus:ring-2 focus:ring-brand-500 outline-none"></textarea></div><div class="pt-4 flex justify-end gap-3"><button type="button" id="cancelLeaveModalBtn" class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white">ยกเลิก</button><button type="submit" id="saveLeaveBtn" class="px-5 py-2 text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 dark:bg-sky-600 dark:hover:bg-sky-700 rounded-lg shadow-sm flex items-center"><span>ส่งใบลา</span><span id="saveLeaveSpinner" class="hidden ml-2 inline-block animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></span></button></div></form></div>
    </div>
  </div>

  <script src="assets/js/header.js?v=simple-header-v4-self-mount"></script>
  <script type="module" src="assets/js/leave.js?v=simple-header-v4-self-mount"></script>
</body>
</html>
