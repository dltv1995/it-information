<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบบริหารจัดการ สารสนเทศและสื่อสารองค์กร</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="assets/js/session-timeout.js?v=session-timeout-v1script>"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        // Check Theme Preference
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'], },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            800: '#075985',
                            900: '#0f172a', /* Dark Navy / Slate 900 */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-theme h-screen flex items-center justify-center overflow-hidden">
    
    <!-- Background Decor -->
    <div class="absolute top-0 left-0 w-full h-1/3 bg-brand-900 z-0 transition-theme"></div>

    <div class="bg-white dark:bg-slate-800 w-full max-w-md p-8 md:p-10 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 relative z-10 m-4 transition-theme">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-brand-50 dark:bg-slate-700 rounded-2xl mx-auto flex items-center justify-center mb-5 border border-brand-100 dark:border-slate-600 transition-theme">
                <svg class="w-8 h-8 text-brand-600 dark:text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 dark:text-white mb-1 transition-theme">เข้าสู่ระบบ</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 transition-theme">ระบบบริหารจัดการ สารสนเทศและสื่อสารองค์กร</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div id="error-message" class="hidden bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-sm p-4 rounded-xl border border-red-100 dark:border-red-800/50 text-center transition-theme"></div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1 transition-theme">อีเมลผู้ใช้งาน</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-theme bg-white dark:bg-slate-700 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500" placeholder="email@company.com">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1 transition-theme">รหัสผ่าน</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-theme bg-white dark:bg-slate-700 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500" placeholder="••••••••">
            </div>

            <button type="submit" id="loginBtn" class="w-full py-3.5 mt-4 bg-brand-600 dark:bg-sky-600 text-white font-medium rounded-xl hover:bg-brand-700 dark:hover:bg-sky-700 focus:ring-4 focus:ring-brand-500/30 transition-all duration-200 flex justify-center items-center shadow-sm">
                <span>เข้าสู่ระบบ</span>
                <div id="loginSpinner" class="hidden ml-3 inline-block animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div>
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-slate-400 dark:text-slate-500 transition-theme">
            &copy; <span id="year"></span> ฝ่ายสารสนเทศและสื่อสารองค์กร
            <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
        </div>
    </div>

    <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
